<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --tl-primary: #4f46e5;
      --tl-primary-hover: #4338ca;
      --tl-bg: #fafafa;
      --tl-border: #e5e7eb;
      --tl-text: #111827;
      --tl-muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 12px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: var(--tl-text);
    }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h3 {
      margin: 0;
      font-size: 15px;
    }
    .tagline {
      font-size: 11px;
      color: var(--tl-muted);
      font-style: italic;
    }
    .template-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 400px;
      overflow-y: auto;
    }
    .template-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--tl-bg);
      border: 1px solid var(--tl-border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .template-item:hover {
      background: #eef2ff;
      border-color: var(--tl-primary);
    }
    .template-item:focus-visible {
      outline: 2px solid var(--tl-primary);
      outline-offset: 1px;
    }
    .template-name {
      font-weight: 500;
    }
    .template-shortcut {
      font-size: 11px;
      color: var(--tl-muted);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      background: #fff;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--tl-border);
    }
    .empty {
      color: var(--tl-muted);
      text-align: center;
      padding: 20px;
    }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    .footer a {
      color: var(--tl-primary);
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }
    .search-box {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      border: 1px solid var(--tl-border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: var(--tl-text);
    }
    .search-box:focus {
      outline: none;
      border-color: var(--tl-primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.15);
    }
    #popup-error {
      background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b;
      padding: 10px 12px; border-radius: 6px; font-size: 12px;
      margin-top: 10px; line-height: 1.4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --tl-bg: #111827; --tl-border: #374151; --tl-text: #f3f4f6; --tl-muted: #9ca3af;
      }
      body { background: #1f2937; }
      .search-box { background: #111827; }
      .template-item:hover { background: #312e81; }
      .template-shortcut { background: #1f2937; }
      .footer { border-top-color: #374151; }
      #popup-error { background: #3f1d1d; border-color: #7f1d1d; color: #fca5a5; }
    }
    .credits {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: #9ca3af;
    }
    .credits a {
      color: #9ca3af;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .credits a:hover { color: var(--tl-primary); }
  </style>
</head>
<body>
  <div class="header">
    <h3 id="heading"></h3>
    <span class="tagline" id="tagline"></span>
  </div>
  <input type="search" id="search" class="search-box" autocomplete="off" />
  <div id="list" class="template-list" role="list"></div>
  <div class="footer">
    <a id="options-link"></a>
    <span id="shortcut-hint" style="color:#9ca3af"></span>
  </div>
  <div class="credits">
    <a href="https://kaktusdev.net" target="_blank" rel="noopener">kaktusdev.net</a>
    <span>·</span>
    <a href="https://github.com/yfthcn" target="_blank" rel="noopener" title="GitHub">

      GitHub

  </div>
  <script src="common.js"></script>
  <script src="popup.js"></script>
</body>
</html>
